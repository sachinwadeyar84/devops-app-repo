trigger:
- main

pool:
  name: Default

variables:
- group: terraform-secrets

- name: ACR_NAME
  value: sachindevops

- name: IMAGE_NAME
  value: devops-app

- name: IMAGE_TAG
  value: $(Build.BuildId)

steps:

# 🔐 Azure Login
- script: |
    az login --service-principal -u $(ARM_CLIENT_ID) -p $(ARM_CLIENT_SECRET) --tenant $(ARM_TENANT_ID)
  displayName: 'Azure Login'

# 🐳 Build Docker Image
- script: |
    docker build -t $(ACR_NAME).azurecr.io/$(IMAGE_NAME):$(IMAGE_TAG) .
  displayName: 'Build Docker Image'

# 🔑 Login to ACR
- script: |
    az acr login --name $(ACR_NAME)
  displayName: 'ACR Login'

# 📦 Push Image (version + latest)
- script: |
    docker push $(ACR_NAME).azurecr.io/$(IMAGE_NAME):$(IMAGE_TAG)
    
    docker tag $(ACR_NAME).azurecr.io/$(IMAGE_NAME):$(IMAGE_TAG) $(ACR_NAME).azurecr.io/$(IMAGE_NAME):latest
    
    docker push $(ACR_NAME).azurecr.io/$(IMAGE_NAME):latest
  displayName: 'Push Image to ACR (version + latest)'

# ☸️ Get AKS Credentials
- script: |
    az aks get-credentials --resource-group devops-rg --name devops-aks --overwrite-existing
  displayName: 'Get AKS Credentials'

# 🔐 Create/Update ACR Secret (FIXED for Windows)
- script: |
    kubectl create secret docker-registry acr-secret ^
      --docker-server=$(ACR_NAME).azurecr.io ^
      --docker-username=$(ACR_USERNAME) ^
      --docker-password=$(ACR_PASSWORD) ^
      --dry-run=client -o yaml | kubectl apply -f -
  displayName: 'Create/Update ACR Secret'

# 🚀 Deploy Latest Image to AKS
- script: |
    kubectl set image deployment/devops-app devops-app=$(ACR_NAME).azurecr.io/$(IMAGE_NAME):latest
  displayName: 'Deploy Latest Image'

# 🔄 Restart pods to ensure pull
- script: |
    kubectl rollout restart deployment devops-app
  displayName: 'Restart Deployment'
